<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Gallery</title>

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <!-- Header -->
        <div class="top-section">

            <h2 class="heading">
                <span></span>
                NEW PRODUCT
            </h2>

            <div class="search-box">
                <input
                    type="text"
                    id="searchInput"
                    placeholder="Search Products..."
                >

                <i class="fa-solid fa-magnifying-glass"></i>
            </div>

        </div>

        <!-- Navigation -->
        <nav>

          <a href="#" class="active" data-category="all">All</a>

          <a href="#" data-category="womens">Women's</a>

          <a href="#" data-category="mens">Men's</a>

          <a href="#" data-category="tops">Tops</a>

          <a href="#" data-category="beauty">Beauty</a>

          <a href="#" data-category="fragrances">Fragrances</a>
        </nav>

        <!-- Products -->
        <div id="productContainer" class="products">

            <!-- JavaScript will create cards here -->

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
